<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>xtrm console - complete design mock</title>
  <style>
    :root {
      color-scheme: light;
      --surface-1: #fdfdfd;
      --surface-2: #f7f8f9;
      --line-subtle: rgba(15, 23, 42, 0.07);
      --line: rgba(15, 23, 42, 0.14);
      --text-primary: #172033;
      --text-secondary: #536071;
      --text-muted: #87909e;
      --accent: #3a5fce;
      --ready: #2f8d5e;
      --blocked: #8c4a1f;
      --font-ui: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", "SFMono-Regular", Consolas, ui-monospace, monospace;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--surface-2);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 12.5px;
      line-height: 1.45;
      overflow: hidden;
    }
    button { color: inherit; cursor: pointer; font: inherit; }
    .mono { font-family: var(--font-mono); }

    .handoff {
      display: grid;
      grid-template-rows: 42px minmax(0, 1fr);
      height: 100vh;
      min-width: 1080px;
    }
    .topbar {
      align-items: stretch;
      background: var(--surface-1);
      border-bottom: 1px solid var(--line-subtle);
      display: flex;
      min-width: 0;
    }
    .brand {
      align-items: center;
      border-right: 1px solid var(--line-subtle);
      display: inline-flex;
      gap: 8px;
      font-weight: 720;
      padding: 0 14px;
      width: 226px;
    }
    .brand-mark {
      background: var(--accent);
      border-radius: 2px;
      height: 8px;
      width: 8px;
    }
    .tabs {
      align-items: stretch;
      display: flex;
      min-width: 0;
    }
    .tab {
      background: transparent;
      border: 0;
      border-bottom: 2px solid transparent;
      color: var(--text-secondary);
      padding: 0 12px;
      white-space: nowrap;
    }
    .tab.is-active {
      border-bottom-color: var(--accent);
      color: var(--text-primary);
      font-weight: 650;
    }
    .meta {
      align-items: center;
      border-left: 1px solid var(--line-subtle);
      color: var(--text-muted);
      display: inline-flex;
      gap: 12px;
      margin-left: auto;
      padding: 0 14px;
      white-space: nowrap;
    }
    .meta b { color: var(--text-primary); font-weight: 650; }
    .viewer {
      min-height: 0;
      min-width: 0;
      position: relative;
    }
    .frame {
      border: 0;
      display: none;
      height: 100%;
      inset: 0;
      position: absolute;
      width: 100%;
    }
    .frame.is-active { display: block; }
    .hint {
      background: rgba(253, 253, 253, 0.86);
      border: 1px solid var(--line);
      border-radius: 4px;
      bottom: 14px;
      color: var(--text-secondary);
      display: flex;
      gap: 8px;
      left: 14px;
      padding: 7px 9px;
      position: absolute;
      z-index: 2;
    }
    .hint strong { color: var(--text-primary); font-weight: 650; }
    .hint span { color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="handoff">
    <header class="topbar">
      <div class="brand"><span class="brand-mark"></span><span>xtrm console</span></div>
      <nav class="tabs" aria-label="Complete mock views">
        <button class="tab is-active" data-view="console">Console reference</button>
        <button class="tab" data-view="operations">Operations query lab</button>
        <button class="tab" data-view="drawer">Object-first drawer</button>
      </nav>
      <div class="meta"><span>complete mock</span><b>pre-substrate</b><span class="mono">2026-06-04</span></div>
    </header>

    <main class="viewer">
      <iframe class="frame is-active" data-frame="console" src="./post-roadmap-console.html" title="Console reference mock"></iframe>
      <iframe class="frame" data-frame="operations" src="./operations-query-lab.html" title="Operations query lab mock"></iframe>
      <iframe class="frame" data-frame="drawer" src="./object-first-drawer-console.html" title="Object-first drawer mock"></iframe>
      <div class="hint"><strong>Handoff HTML</strong><span>contains console reference, Operations Query Lab, and the object-first drawer inspector.</span></div>
    </main>
  </div>

  <script>
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const frames = Array.from(document.querySelectorAll(".frame"));
    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const view = tab.dataset.view;
        tabs.forEach((item) => item.classList.toggle("is-active", item === tab));
        frames.forEach((frame) => frame.classList.toggle("is-active", frame.dataset.frame === view));
      });
    });
  </script>
</body>
</html>
