services:
  gitboard:
    container_name: gitboard
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3000"
      AGENT_FORGE_DB: /data/state.db
      PROJECTS_DIR: /projects
    volumes:
      - gitboard-state:/data
      - ${HOME}/projects:/projects:ro

volumes:
  gitboard-state:
