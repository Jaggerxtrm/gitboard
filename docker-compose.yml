services:
  xtrm:
    container_name: xtrm
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # XTRM data
      - xtrm-data:/home/xtrm/.xtrm
      # Projects for beadboard
      - /home/dawid/projects:/home/xtrm/projects:ro,Z
      - /home/dawid/.beads:/home/xtrm/.beads-host:ro,Z
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - PORT=3000
      - HOME=/home/xtrm
      - XDG_PROJECTS_DIR=/home/xtrm/projects
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    driver: bridge

volumes:
  xtrm-data: